{% extends 'base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/gallery.css' %}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<div class="container py-5">

    <h1 class="gallery-title">
        Event Gallery
    </h1>

    <div class="row g-4">

        <!-- Event 1 -->
        <div class="col-lg-4 col-md-6">
            <div class="gallery-card">

                <img src="{% static 'images/event1.jpg' %}" alt="Event">

                <div class="overlay"></div>


            </div>
        </div>

        <!-- Event 2 -->
        <div class="col-lg-4 col-md-6">
            <div class="gallery-card">

                <img src="{% static 'images/event2.jpg' %}" alt="Event">

                <div class="overlay"></div>


            </div>
        </div>

        <!-- Event 3 -->
        <div class="col-lg-4 col-md-6">
            <div class="gallery-card">

                <img src="{% static 'images/event3.jpg' %}" alt="Event">

                <div class="overlay"></div>


            </div>
        </div>

        <!-- Event 4 -->
        <div class="col-lg-4 col-md-6">
            <div class="gallery-card">

                <img src="{% static 'images/event4.jpg' %}" alt="Event">

                <div class="overlay"></div>


            </div>
        </div>

        <!-- Tech Fest -->
        <div class="col-lg-4 col-md-6">
            <div class="gallery-card">

                <img src="{% static 'images/tech_fest.png' %}" alt="Tech Fest">

                <div class="overlay"></div>

            </div>
        </div>

        <!-- Cultural Fest -->
        <div class="col-lg-4 col-md-6">
            <div class="gallery-card">

                <img src="{% static 'images/cultural.png' %}" alt="Cultural Fest">

                <div class="overlay"></div>
            </div>
        </div>

    </div>

</div>

{% endblock %}
