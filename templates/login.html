{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>


<link rel="stylesheet" href="{% static 'css/login.css' %}">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body>

<div class="login-container">

<!-- LOGIN FORM -->

<div class="login-card" id="loginForm">

    <a href="{% url 'home' %}" class="close-btn">&times;</a>

    <h2>
        <i class="fas fa-user-circle"></i>
        Login
    </h2>

    <form method="POST">
        {% csrf_token %}

        <input type="hidden" name="action" value="login">

        <div class="mb-3">
            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Username">
        </div>

        <div class="mb-3">
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Password">
        </div>

        <button type="submit"
                class="btn btn-danger w-100">
            Login
        </button>

    </form>
    
    <p class="register-link mt-3">
        Don't have an account?
        <a href="#" onclick="showRegister(); return false;">
            Register
        </a>
    </p>

</div>


<!-- REGISTER FORM -->

<div class="login-card" id="registerForm" style="display:none;">

    <a href="{% url 'home' %}" class="close-btn">&times;</a>

    <h2>
        <i class="fas fa-user-plus"></i>
        Register
    </h2>

    <form method="POST">
        {% csrf_token %}

        <input type="hidden" name="action" value="register">

        <div class="mb-3">
            <input type="text"
                   name="fullname"
                   class="form-control"
                   placeholder="Full Name">
        </div>

        <div class="mb-3">
            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Email">
        </div>

        <div class="mb-3">
            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Username">
        </div>

        <div class="mb-3">
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Password">
        </div>

        <button type="submit"
                class="btn btn-danger w-100">
            Register
        </button>

    </form>

    <p class="register-link mt-3">
        Already have an account?
        <a href="#" onclick="showLogin(); return false;">
            Login
        </a>
    </p>

</div>


</div>

<script>
function showRegister() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "block";
}

function showLogin() {
    document.getElementById("registerForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
}
</script>

</body>
</html>
